name: Test, build and release
on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    name: Test, build and release
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: setup repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: verify CJS require
        run: node -e "const { createLightship } = require('./dist/cjs'); console.log('CJS require works:', typeof createLightship)"
      - name: audit production deps
        run: npm audit --omit=dev
      - name: release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    timeout-minutes: 10
