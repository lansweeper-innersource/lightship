name: Test and build
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - name: setup repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: verify CJS require
        run: node -e "const { createLightship } = require('./dist/cjs'); console.log('CJS require works:', typeof createLightship)"
      - name: audit production deps
        run: npm audit --omit=dev
      - name: trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          scanners: vuln
          exit-code: 1
    timeout-minutes: 10
